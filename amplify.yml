version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Write server-side env vars to .env.production so the SSR Lambda can read them
        - env | grep -e MYSCRIPT_ >> .env.production
        - env | grep -e GOOGLE_CLOUD_ >> .env.production
        - npm run build
        # Amplify's Next.js adapter doesn't deploy public/ for Next.js 16.
        # Copy audio files into .next/static/ which IS deployed.
        # The Next.js rewrite in next.config.ts maps /audio/* to /_next/static/audio/*
        - cp -r public/audio .next/static/audio
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
