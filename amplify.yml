version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        # Standalone output nests the project under the workspace root path.
        # Find the actual server.js location and copy public/ + static/ there.
        - export STANDALONE_DIR=$(dirname $(find .next/standalone -name "server.js" -not -path "*/node_modules/*" | head -1))
        - cp -r public "$STANDALONE_DIR/public"
        - cp -r .next/static "$STANDALONE_DIR/.next/static"
        # Move contents to a flat output directory for Amplify
        - mkdir -p .next/deploy
        - cp -r "$STANDALONE_DIR"/. .next/deploy/
  artifacts:
    baseDirectory: .next/deploy
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
